name: Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --dev
      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 20
        run: uv run pytest
      - name: Run tests (Windows, with reruns)
        # Windows hosts surface known timing flakes (Textual mount races,
        # autocomplete debounce, slow PATH stat) that are being fixed
        # progressively; --reruns 2 lets a transient first failure recover
        # without blocking PRs while the underlying races are addressed.
        if: runner.os == 'Windows'
        timeout-minutes: 20
        run: uv run pytest --reruns 2 --reruns-delay 1 --only-rerun "NoMatches|WorkerCancelled|AssertionError"
