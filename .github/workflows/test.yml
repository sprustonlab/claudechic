name: Tests
on: [push, pull_request]

# Dedup the push+pull_request double-trigger: when you push a branch and open
# a PR for it, both events fire for the same SHA, doubling matrix jobs (24
# instead of 12). Grouping by head_ref (PR source branch) with fallback to
# ref_name (push target branch) gives both events the same group key, so the
# second one cancels the first. Side effect: new pushes to the same branch
# also cancel the prior run, which is the conventional behavior.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --dev
      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 20
        run: uv run pytest
      - name: Run tests (Windows, with reruns)
        # Windows hosts surface known timing flakes (Textual mount races,
        # autocomplete debounce, slow PATH stat) that are being fixed
        # progressively; --reruns 2 lets a transient first failure recover
        # without blocking PRs while the underlying races are addressed.
        if: runner.os == 'Windows'
        timeout-minutes: 20
        run: uv run pytest --reruns 2 --reruns-delay 1 --only-rerun "NoMatches|WorkerCancelled|AssertionError"
