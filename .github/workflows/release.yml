# Disabled: PyPI name "claudechic" is taken (see issue #22).
# Uncomment the trigger below once the naming conflict is resolved.
name: Release to PyPI

# on:
#   push:
#     tags:
#       - '[0-9]*'
on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv build

      - name: Verify package
        run: uvx --with dist/*.whl claudechic --version

      - uses: pypa/gh-action-pypi-publish@release/v1
