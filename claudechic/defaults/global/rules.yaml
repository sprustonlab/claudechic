- id: no_rm_rf
  trigger: PreToolUse/Bash
  enforcement: deny
  detect:
    pattern: "rm\\s+-rf\\s+/"
  message: "Dangerous: rm -rf on absolute path. Request override if intentional."

- id: warn_sudo
  trigger: PreToolUse/Bash
  enforcement: warn
  detect:
    pattern: "^sudo\\s"
  message: "Using sudo -- acknowledge if intentional."

- id: log_git_operations
  trigger: PreToolUse/Bash
  enforcement: log
  detect:
    pattern: "^git\\s"
  message: "Git operation logged for audit trail."

- id: no_bare_pytest
  trigger: PreToolUse/Bash
  enforcement: deny
  detect:
    pattern: "(?:^|[;&|]\\s*)(?:python\\s+-m\\s+)?pytest\\b(?!.*(?:\\.py\\b|-k\\s|--junitxml|\\.test_results/|\\btee\\b|--co\\b|--collect-only|--fixtures))"
  message: |
    Bare pytest blocked. Full-suite runs must save timestamped results.
    Use: TS=$(date -u +%Y-%m-%d_%H%M%S) && pytest --junitxml=.test_results/${TS}.xml --tb=short 2>&1 | tee .test_results/${TS}.log
    Or target a specific test: pytest tests/test_foo.py

- id: pytest_needs_timeout
  trigger: PreToolUse/Bash
  enforcement: warn
  detect:
    pattern: "(?:^|[;&|]\\s*)(?:(?:python(?:\\d+(?:\\.\\d+)*)?|uv\\s+run|uvx|poetry\\s+run)\\s+(?:-m\\s+)?)?pytest\\b(?!.*--timeout)"
  message: "use --timeout=N (default 30) to avoid hung tests"

