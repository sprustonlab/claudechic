workflow_id: project-team
main_role: coordinator

phases:
  - id: vision
    file: vision
    advance_checks:
      - type: manual-confirm
        prompt: "Vision approved by user?"
  - id: setup
    file: setup
    advance_checks:
      - type: artifact-dir-ready-check
        on_failure:
          message: "Artifact directory not set — call `set_artifact_dir(...)` MCP tool before advancing."
      - type: command-output-check
        command: "test -f \"${CLAUDECHIC_ARTIFACT_DIR}/STATUS.md\" && echo PRESENT"
        pattern: "PRESENT"
      - type: command-output-check
        command: "test -f \"${CLAUDECHIC_ARTIFACT_DIR}/userprompt.md\" && echo PRESENT"
        pattern: "PRESENT"
  - id: leadership
    file: leadership
  - id: specification
    file: specification
    advance_checks:
      - type: command-output-check
        command: "python -c \"import glob; print('\\n'.join(glob.glob('.project_team/*/specification/SPECIFICATION.md')))\""
        pattern: "SPECIFICATION\\.md"
      - type: manual-confirm
        prompt: "Specification approved by user?"
    hints:
      - message: "Synthesize all Leadership findings before presenting to user"
        lifecycle: show-once
  - id: implementation
    file: implementation
    advance_checks:
      - type: manual-confirm
        prompt: "All Leadership agents approve implementation?"
  - id: testing-vision
    file: testing_vision
    advance_checks:
      - type: command-output-check
        command: "ls $STATE_DIR/userprompt_testing.md 2>/dev/null"
        pattern: "userprompt_testing\\.md"
      - type: manual-confirm
        prompt: "Testing vision approved by user?"
  - id: testing-specification
    file: testing_specification
    advance_checks:
      - type: command-output-check
        command: "ls $STATE_DIR/specification/TEST_SPECIFICATION.md 2>/dev/null"
        pattern: "TEST_SPECIFICATION\\.md"
      - type: manual-confirm
        prompt: "Test specification approved by user?"
  - id: testing-implementation
    file: testing_implementation
    advance_checks:
      - type: manual-confirm
        prompt: "All tests passing and compliant with testing standard?"
  - id: documentation
    file: documentation
    advance_checks:
      - type: manual-confirm
        prompt: "Documentation complete and reviewed?"
  - id: signoff
    file: signoff

rules:
  - id: no_direct_code_coordinator
    trigger: PreToolUse/Write
    enforcement: warn
    detect:
      field: file_path
      pattern: ".+"
    exclude_if_matches: "\\.md$"
    message: "Coordinator should delegate code writing to Implementer agents"
    roles: [coordinator]

  - id: no_push_before_testing
    trigger: PreToolUse/Bash
    enforcement: deny
    detect:
      pattern: "git push"
    message: "No pushing before testing phase"
    exclude_phases: [testing-implementation, documentation, signoff]

  - id: no_force_push
    trigger: PreToolUse/Bash
    enforcement: deny
    detect:
      pattern: "git push\\s.*(--force-with-lease|--force\\b|-f\\b)"
    message: "Force push is never allowed"

  - id: no_close_leadership
    trigger: PreToolUse/mcp__chic__close_agent
    enforcement: warn
    message: >-
      Do not close agents during active workflow phases. Agents carry context
      that is lost on close. Wait until signoff phase.
    roles: [coordinator]
    exclude_phases: [signoff]
