workflow_id: project-team
main_role: coordinator

phases:
  - id: vision
    file: vision
    advance_checks:
      - type: manual-confirm
        prompt: "Vision approved by user?"
  - id: setup
    file: setup
    advance_checks:
      - type: command-output-check
        command: "python -c \"import glob; print('\\n'.join(glob.glob('.project_team/*/STATUS.md')))\""
        pattern: "STATUS\\.md"
      - type: command-output-check
        command: "python -c \"import glob; print('\\n'.join(glob.glob('.project_team/*/userprompt.md')))\""
        pattern: "userprompt\\.md"
  - id: leadership
    file: leadership
  - id: specification
    file: specification
    advance_checks:
      - type: command-output-check
        command: "python -c \"import glob; print('\\n'.join(glob.glob('.project_team/*/specification/SPECIFICATION.md')))\""
        pattern: "SPECIFICATION\\.md"
      - type: manual-confirm
        prompt: "Specification approved by user?"
    hints:
      - message: "Synthesize all Leadership findings before presenting to user"
        lifecycle: show-once
  - id: implementation
    file: implementation
    advance_checks:
      - type: manual-confirm
        prompt: "All Leadership agents approve implementation?"
  - id: testing
    file: testing
    advance_checks:
      - type: manual-confirm
        prompt: "All tests passing?"
      - type: manual-confirm
        prompt: "Ready to proceed to sign-off?"
  - id: documentation
    file: documentation
    advance_checks:
      - type: manual-confirm
        prompt: "Documentation complete and reviewed?"
  - id: signoff
    file: signoff

rules:
  - id: no_direct_code_coordinator
    trigger: PreToolUse/Write
    enforcement: warn
    detect:
      field: file_path
      pattern: ".+"
    exclude_if_matches: "\\.md$"
    message: "Coordinator should delegate code writing to Implementer agents"
    roles: [coordinator]

  - id: no_push_before_testing
    trigger: PreToolUse/Bash
    enforcement: deny
    detect:
      pattern: "git push"
    message: "No pushing before testing phase"
    exclude_phases: [testing, documentation, signoff]

  - id: no_force_push
    trigger: PreToolUse/Bash
    enforcement: deny
    detect:
      pattern: "git push\\s.*(--force-with-lease|--force\\b|-f\\b)"
    message: "Force push is never allowed"

  - id: prefer_ask_agent
    trigger: PreToolUse/mcp__chic__tell_agent
    enforcement: warn
    message: >-
      Coordinator should use ask_agent (not tell_agent) to ensure sub-agents
      respond. tell_agent is fire-and-forget with no reply. Use ask_agent
      unless you explicitly don't need a response.
    roles: [coordinator]

  - id: no_close_leadership
    trigger: PreToolUse/mcp__chic__close_agent
    enforcement: warn
    message: >-
      Do not close agents during active workflow phases. Agents carry context
      that is lost on close. Wait until signoff phase.
    exclude_phases: [signoff]
