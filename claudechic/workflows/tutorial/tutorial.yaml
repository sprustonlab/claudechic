workflow_id: tutorial
main_role: learner

phases:
  - id: checks
    file: checks
    hints:
      - message: "Phase 1/4: Checks & Phase Transitions. advance_checks gate phase transitions."
        lifecycle: show-once
      - message: "This phase requires tutorial_checks_done.txt AND manual confirmation to advance."
        lifecycle: show-once
    advance_checks:
      - type: file-exists-check
        path: "tutorial_checks_done.txt"
        on_failure:
          message: "Create tutorial_checks_done.txt first"
          severity: warning
      - type: manual-confirm
        prompt: "Ready to move to the rules phase?"

  - id: rules
    file: rules
    hints:
      - message: "Phase 2/4: Rules. You'll see deny, warn, and log enforcement in action."
        lifecycle: show-once
      - message: "Try: ask the agent to run 'rm -rf /tmp/test' -- deny rule should block it."
        lifecycle: show-once
      - message: "Try: ask the agent to run 'sudo echo hi' -- warn rule should fire, agent can acknowledge."
        lifecycle: show-once
      - message: "Try: ask the agent to run 'git status' -- log rule fires silently, check .claude/hits.jsonl."
        lifecycle: show-once
    advance_checks:
      - type: file-exists-check
        path: "tutorial_rules_done.txt"
        on_failure:
          message: "Create tutorial_rules_done.txt to advance"
          severity: warning

  - id: injections
    file: injections
    hints:
      - message: "Phase 3/4: Injections. You'll see how tool inputs can be modified and how phase-scoped rules work."
        lifecycle: show-once
      - message: "Try: ask the agent to run 'echo hello' -- the injection will append text to the command."
        lifecycle: show-once
      - message: "There's also a phase-scoped warn rule here that blocks Write -- it only fires in this phase, not others."
        lifecycle: show-once
    advance_checks:
      - type: file-exists-check
        path: "tutorial_injections_done.txt"
        on_failure:
          message: "Create tutorial_injections_done.txt to advance to graduation"
          severity: warning

  - id: graduation
    file: graduation
    hints:
      - message: "Phase 4/4: Graduation! You've seen all features. Run /tutorial stop to deactivate."
        lifecycle: show-once

rules:
  - id: no_write_in_injections
    trigger: PreToolUse/Write
    enforcement: warn
    message: "Writing is restricted in the injections phase -- this rule is phase-scoped, it only fires here."
    phases: [injections]

  - id: require_tee_in_rules
    trigger: PreToolUse/Bash
    enforcement: log
    detect:
      pattern: "pytest"
    message: "Pytest detected in rules phase -- logged for demonstration."
    phases: [rules]

injections:
  - id: echo_injection
    trigger: PreToolUse/Bash
    detect:
      pattern: "^echo "
    inject_value: " '(injected by tutorial workflow)'"
    phases: [injections]

hints:
  - id: phase_scoping_tip
    message: "Notice: rules change based on which phase you're in. Some rules only fire during specific phases."
    lifecycle: show-every-session
