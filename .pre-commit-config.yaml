repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        # Bumped from 100 to 200 KB to admit
        # `.project_team/pyright_cleanup/specification/manifest.jsonl`
        # (~145 KB), the canonical audit trail for the pyright_cleanup
        # project per SPECIFICATION.md s 4 (Compositional Law). Headroom
        # leaves room for similar manifest-as-law artifacts in future
        # multi-agent workflow projects without being permissive enough
        # to slip large binaries past review.
        args: ['--maxkb=200']
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
      - id: block-project-team-on-main
        name: Block .project_team/ on main
        entry: bash -c 'branch=$(git rev-parse --abbrev-ref HEAD); if [ "$branch" = "main" ]; then echo ".project_team/ files must not be committed to main (develop only)"; exit 1; fi'
        language: system
        files: ^\.project_team/
        pass_filenames: false
